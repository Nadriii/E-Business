<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Kernel</title>
    <link rel="icon" type="image/jpeg" href="imagenes/Image.jpg">
    <style>
        :root { 
            --kernel-cyan: #00e5ff; 
            --kernel-blue-dark: #003b46; 
            --kernel-gradient: radial-gradient(circle, #005f6b 0%, #002b36 100%); 
            --white: #ffffff; 
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background: var(--kernel-gradient) fixed; 
            color: var(--white); 
            background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png'); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        header { 
            background-color: rgba(0, 43, 54, 0.95); 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 3px solid var(--kernel-cyan); 
        }
        .logo-area { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .key-logo { 
            width: 45px; 
            height: 45px; 
            background: #1e293b; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            color: var(--kernel-cyan); 
        }
        .brand-name { font-size: 1.8rem; font-weight: 800; color: white; text-transform: uppercase; }
        nav { display: flex; gap: 20px; }
        nav a { color: var(--white); text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; padding: 8px 12px; }
        nav a:hover, nav a.nav-active { color: var(--kernel-cyan); background: rgba(0, 229, 255, 0.1); }
        main { flex: 1; padding: 40px 5%; }
        .contact-wrapper { max-width: 600px; margin: 0 auto; background: rgba(0, 20, 26, 0.8); padding: 40px; border-radius: 15px; border: 1px solid rgba(0, 229, 255, 0.2); }
        .contact-wrapper h2 { color: var(--kernel-cyan); margin-top:0; text-align: center; }
        
        .social-channels {
            display: block;
            margin: 25px 0;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 25px;
        }
        .social-btn {
            display: block;
            text-align: center;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .social-btn:hover {
            transform: translateY(-2px);
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: #002b36;
            box-shadow: 0 4px 14px rgba(37, 211, 102, 0.3);
        }
        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(220, 39, 67, 0.3);
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #b0c4de; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid rgba(0, 229, 255, 0.4); background: rgba(0,0,0,0.3); color: white; outline: none; box-sizing: border-box; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--kernel-cyan); }
        .btn-main { background: var(--kernel-cyan); color: var(--kernel-blue-dark); padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }
        
        /* Mensajes de respuesta */
        .form-status { display: none; text-align: center; padding: 15px; border-radius: 6px; margin-top: 15px; font-weight: bold; }
        .form-status.success { display: block; background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
        .form-status.error { display: block; background: rgba(255, 77, 77, 0.2); color: #ff4d4d; border: 1px solid #ff4d4d; }
        
        footer { background-color: rgba(0, 20, 26, 0.95); padding: 20px; text-align: center; color: #b0c4de; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo-area">
        <div class="key-logo">K</div>
        <h1 class="brand-name">Kernel</h1>
    </a>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="productos.html">Productos</a>
        <a href="tienda.html">Tienda</a>
        <a href="contacto.html" class="nav-active">Contacto</a>
    </nav>
</header>

<main>
    <div class="contact-wrapper">
        <h2>Canales de Atención Directa</h2>
        
        <div class="social-channels">
            <a href="https://wa.me/595984276867" target="_blank" class="social-btn btn-whatsapp">
                💬 Contactar por WhatsApp
            </a>
            <a href="https://www.instagram.com/kernel_py/" target="_blank" class="social-btn btn-instagram">
                📸 Síguenos en Instagram (@kernel_py)
            </a>
        </div>

        <h2>O envíanos un correo</h2>
        
        <!-- Formulario procesado por JavaScript mediante Formspree -->
        <form id="kernel-form" action="https://formspree.io/f/xvondvbe" method="POST">
            <div class="form-group">
                <label for="c-name">Nombre Completo</label>
                <input type="text" name="name" id="c-name" required placeholder="Ej: Juan Pérez">
            </div>
            <div class="form-group">
                <label for="c-email">Correo Electrónico</label>
                <input type="email" name="email" id="c-email" required placeholder="Ej: juan@gmail.com">
            </div>
            <div class="form-group">
                <label for="c-msg">Mensaje / Consulta Técnica</label>
                <textarea name="message" id="c-msg" rows="4" required placeholder="¿En qué te podemos ayudar?"></textarea>
            </div>
            <button type="submit" id="submit-btn" class="btn-main">Enviar Mensaje</button>
            
            <!-- Contenedor para mostrar respuestas sin salir de la página -->
            <div id="form-status-box" class="form-status"></div>
        </form>
    </div>
</main>

<footer>
    <p>&copy; 2026 Kernel - Todos los derechos reservados.</p>
</footer>

<script>
    const form = document.getElementById("kernel-form");
    const statusBox = document.getElementById("form-status-box");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async function(event) {
        event.preventDefault(); // Evita que la página se recargue o redirija
        
        submitBtn.innerText = "ENVIANDO...";
        submitBtn.disabled = true;
        
        const data = new FormData(event.target);
        
        try {
            const response = await fetch(form.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            });
            
            if (response.ok) {
                statusBox.className = "form-status success";
                statusBox.innerText = "¡Consulta enviada con éxito! Nos comunicaremos contigo pronto.";
                form.reset();
            } else {
                throw new Error();
            }
        } catch (error) {
            statusBox.className = "form-status error";
            statusBox.innerText = "Hubo un problema al enviar. Por favor, intenta de nuevo o usa WhatsApp.";
        } finally {
            submitBtn.innerText = "ENVIAR MENSAJE";
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>

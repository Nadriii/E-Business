<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Kernel</title>
    <link rel="icon" type="image/jpeg" href="imagenes/Image.jpg">
    <style>
        :root {
            --kernel-cyan: #00e5ff;
            --kernel-blue-dark: #003b46;
            --kernel-gradient: radial-gradient(circle, #005f6b 0%, #002b36 100%);
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif; margin: 0;
            background: var(--kernel-gradient) fixed; color: var(--white);
            background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png');
            min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
        }
        header {
            background-color: rgba(0, 43, 54, 0.95); padding: 1rem 5%; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 3px solid var(--kernel-cyan);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-area { display: flex; align-items: center; gap: 15px; cursor: pointer; text-decoration: none; }
        .key-logo {
            width: 45px; height: 45px; background: #1e293b; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem; color: var(--kernel-cyan); box-shadow: 0 4px 0 #008ba3, 0 6px 10px rgba(0,0,0,0.5);
        }
        .brand-name { font-size: 1.8rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin: 0; background: linear-gradient(to bottom, #fff 50%, #bbb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { display: flex; gap: 20px; }
        nav a { color: var(--white); text-decoration: none; font-weight: 600; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; padding: 8px 12px; border-radius: 4px; }
        nav a:hover, nav a.nav-active { color: var(--kernel-cyan); background: rgba(0, 229, 255, 0.1); }
        main { flex: 1; }
        .view-section { padding: 20px 5%; display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Buscador e hilos de productos */
        .search-wrapper { position: relative; max-width: 500px; margin: 20px auto; }
        .search-wrapper::before { content: "🔍"; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.7; }
        #product-search { width: 100%; padding: 12px 15px 12px 45px; border-radius: 25px; border: 1px solid var(--kernel-cyan); background: rgba(0,0,0,0.4); color: white; outline: none; box-sizing: border-box; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(8px); border: 1px solid rgba(0, 229, 255, 0.1); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card:hover { border-color: var(--kernel-cyan); transform: scale(1.02); }
        .product-card .img-container { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; overflow: hidden; }
        .product-card img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
        
        /* Detalle Producto */
        .product-detail-container { display: flex; gap: 40px; background: rgba(0,0,0,0.2); padding: 30px; border-radius: 20px; flex-wrap: wrap; }
        .detail-img { flex: 1; min-width: 300px; text-align: center; display: flex; align-items: center; justify-content: center; }
        .detail-img img { max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 15px; border: 1px solid var(--kernel-cyan); }
        .detail-info { flex: 1; min-width: 300px; }
        .detail-info h2 { font-size: 2rem; margin-top: 0; background-color: rgba(0, 43, 54, 0.95); color: var(--white); padding: 12px 20px; border-radius: 8px; border-left: 4px solid var(--kernel-cyan); }
        .specs-list { list-style: none; padding: 0; margin: 20px 0; }
        .specs-list li { margin-bottom: 10px; padding-left: 20px; position: relative; }
        .specs-list li::before { content: "▹"; position: absolute; left: 0; color: var(--kernel-cyan); }
        .price-tag { font-size: 2.5rem; font-weight: bold; margin: 20px 0; display: block; color: var(--white); }
        .btn-main { background: var(--kernel-cyan); color: var(--kernel-blue-dark); padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Carrusel */
        .carousel-section { margin-top: 50px; border-top: 1px solid rgba(0, 229, 255, 0.2); padding-top: 30px; }
        .carousel-track { display: flex; gap: 15px; overflow: hidden; position: relative; height: 120px; }
        .carousel-item { min-width: 115px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 5px; text-align: center; cursor: pointer; box-sizing: border-box; }
        .carousel-item img { height: 65%; width: 100%; object-fit: contain; }
        .carousel-item span { display: block; font-size: 0.7rem; margin-top: 5px; color: var(--kernel-cyan); font-weight: bold; }
        
        /* Carrito de Compras Lateral */
        .cart-panel { position: fixed; right: -400px; top: 0; width: 340px; height: 100%; background: #001f26; z-index: 2000; transition: 0.4s; padding: 25px; border-left: 2px solid var(--kernel-cyan); box-sizing: border-box; }
        .cart-panel.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        .overlay.active { display: block; }
        footer { background-color: rgba(0, 20, 26, 0.95); border-top: 2px solid var(--kernel-cyan); padding: 40px 5% 20px 5%; font-size: 0.9rem; color: #b0c4de; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header>
    <a href="index.html" class="logo-area">
        <div class="key-logo">K</div>
        <h1 class="brand-name">Kernel</h1>
    </a>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Nosotros</a>
        <a href="productos.html" class="nav-active">Productos</a>
        <a href="tienda.html">Tienda</a>
        <a href="contacto.html">Contacto</a>
    </nav>
    <div onclick="toggleCart()" style="cursor:pointer; background: var(--kernel-cyan); color: var(--kernel-blue-dark); padding: 10px 20px; border-radius: 5px; font-weight: bold;">
        🛒 MI CARRITO (<span id="count">0</span>)
    </div>
</header>

<main>
    <section id="catalog-view" class="view-section active">
        <div class="search-wrapper">
            <input type="text" id="product-search" placeholder="Buscar en Kernel..." onkeyup="filterProducts()">
        </div>
        <div class="catalog" id="catalog-grid"></div>
    </section>

    <section id="detail-view" class="view-section">
        <button onclick="showCatalog()" style="background:none; border:none; color:var(--kernel-cyan); cursor:pointer; margin-bottom:20px; font-size: 1rem;">← Volver al catálogo</button>
        <div id="product-detail-content"></div>
        <div class="carousel-section">
            <h4 style="color: var(--kernel-cyan); margin-bottom: 15px;">PRODUCTOS DESTACADOS</h4>
            <div class="carousel-track" id="carousel-track"></div>
        </div>
    </section>
</main>

<aside class="cart-panel" id="cart-panel">
    <h3 style="text-align: center; border-bottom: 1px solid var(--kernel-cyan); padding-bottom: 10px;">TU PEDIDO</h3>
    <div id="cart-list" style="margin: 20px 0; max-height: 70vh; overflow-y: auto;"></div>
    <div style="border-top: 1px solid var(--kernel-cyan); padding-top: 15px;">
        <div style="display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 15px;">
            <span>TOTAL:</span>
            <span id="total" style="color: var(--kernel-cyan); font-weight: bold;">0 Gs.</span>
        </div>
        <button onclick="processPayment()" style="background: #00ff88; color: #003b46; width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
             REALIZAR PEDIDO AL WHATSAPP
        </button>
    </div>
</aside>

<script>
    let products = [
        { id: 1, name: "Funda Notebook - Blue", price: 150000, stock: 15, img: "imagenes/fundaceleste.png", specs: ["Material: Neopreno reforzado", "Cierre: Doble track", "Resistente al agua", "Para notebooks de 14-15.6 pulgadas"] },
        { id: 2, name: "Funda Notebook - Moss", price: 150000, stock: 8, img: "imagenes/fundaverde.png", specs: ["Color: Verde Musgo Táctico", "Interior: Felpa anti-rayones", "Diseño Slim para mochilas", "Costuras de alta densidad"] },
        { id: 3, name: "Funda Notebook - Black", price: 150000, stock: 25, img: "imagenes/fundanegro.png", specs: ["Acabado: Mate Profesional", "Bolsillo extra para cargador", "Protección contra caídas 360"] },
        { id: 4, name: "Teclado Mecánico K1", price: 450000, stock: 5, img: "imagenes/tecladito.png", specs: ["Switch: Red (Silencioso)", "RGB: 16.8 millones de colores", "Cuerpo: Aluminio grado espacial"] },
        { id: 5, name: "Mouse Pro Wireless V1", price: 250000, stock: 12, img: "imagenes/mouseee.png", specs: ["DPI: Hasta 16,000", "Batería: 80 horas de uso", "Peso: 63g Ultra ligero"] },
        { id: 6, name: "Notebook Acer Nitro", price: 8500000, stock: 2, img: "imagenes/nbacer.png", specs: ["Procesador de alto rendimiento", "Sistema de refrigeración avanzada"] },
        { id: 7, name: "Notebook HP Victus", price: 7250000, stock: 3, img: "imagenes/nbvictus.png", specs: ["Gráficos de última generación", "Excellent rendimiento térmico"] },
        { id: 8, name: "Nintendo Switch 2 - 32 GB", price: 3870000, stock: 3, img: "imagenes/nintendo.png", specs: ["Consola híbrida (Portátil/TV)", "Controles Joy-Con incluidos"] },
        { id: 9, name: "Nintendo Switch 2 - 256 GB", price: 4500000, stock: 2, img: "imagenes/nintendo2.png", specs: ["Pantalla OLED de 7 pulgadas", "Alto contraste"] },
        { id: 10, name: "Auriculares QCY Earbuds", price: 180000, stock: 3, img: "imagenes/qcy.png", specs: ["Conexión Bluetooth inalámbrica", "Baja latencia"] },
        { id: 11, name: "Silla Gamer Black Edition", price: 2180000, stock: 8, img: "imagenes/sillanegro.png", specs: ["Ergonomía superior", "Almohadillas lumbar y cervical"] },
        { id: 12, name: "Silla Gamer Orange Spark", price: 2250000, stock: 10, img: "imagenes/sillanaranja.png", specs: ["Detalles en naranja deportivo", "Materiales transpirables"] }
    ];

    let cart = {};
    function formatPrice(p) { return new Intl.NumberFormat('es-PY').format(Math.round(p)) + " Gs."; }
    function showCatalog() { document.getElementById('detail-view').classList.remove('active'); document.getElementById('catalog-view').classList.add('active'); }
    
    function showDetail(id) {
        const product = products.find(p => p.id == id);
        const detailView = document.getElementById('product-detail-content');
        detailView.innerHTML = `
            <div class="product-detail-container">
                <div class="detail-img"><img src="${product.img}"></div>
                <div class="detail-info">
                    <h2>${product.name}</h2>
                    <span style="color:#aaa;">SKU: KR-${product.id}00${product.id} | Stock: ${product.stock}</span>
                    <ul class="specs-list">${product.specs.map(s => `<li>${s}</li>`).join('')}</ul>
                    <span class="price-tag">${formatPrice(product.price)}</span>
                    ${product.stock > 0 ? `<button class="btn-main" onclick="addToCart(${product.id})">AGREGAR AL CARRITO</button>` : `<button class="btn-main" style="background:#555; cursor:not-allowed;" disabled>PRODUCTO AGOTADO</button>`}
                </div>
            </div>
        `;
        document.getElementById('catalog-view').classList.remove('active');
        document.getElementById('detail-view').classList.add('active');
    }

    function renderCatalog(items = products) {
        document.getElementById('catalog-grid').innerHTML = items.map(p => `
            <div class="product-card" onclick="showDetail(${p.id})">
                <div class="img-container"><img src="${p.img}"></div>
                <h3>${p.name}</h3>
                <p style="color:var(--kernel-cyan); font-weight:bold;">${formatPrice(p.price)}</p>
                <p style="color:${p.stock > 0 ? '#00ff88' : '#ff4d4d'}; font-weight:bold;">${p.stock > 0 ? `Stock: ${p.stock}` : 'AGOTADO'}</p>
                <small style="color: #aaa;">Ver especificaciones →</small>
            </div>
        `).join('');
    }

    function initCarousel() {
        const track = document.getElementById('carousel-track');
        track.innerHTML = products.map(p => `<div class="carousel-item" onclick="showDetail(${p.id})"><img src="${p.img}"><span>${formatPrice(p.price)}</span></div>`).join('');
        setInterval(() => {
            const first = track.firstElementChild; if(!first) return;
            track.style.transition = '0.5s'; track.style.transform = 'translateX(-115px)';
            setTimeout(() => { track.style.transition = 'none'; track.style.transform = 'translateX(0)'; track.appendChild(first); }, 500);
        }, 3000);
    }

    function addToCart(id) {
        const p = products.find(prod => prod.id === id);
        if (cart[id]) { if (cart[id].qty < p.stock) cart[id].qty++; else alert("Stock máximo"); } 
        else { cart[id] = { ...p, qty: 1 }; }
        updateUI();
    }

    function changeQty(id, delta) {
        if (cart[id]) {
            cart[id].qty += delta;
            if (cart[id].qty > cart[id].stock) { cart[id].qty = cart[id].stock; }
            if (cart[id].qty <= 0) delete cart[id];
            updateUI();
        }
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        let html = '', subtotal = 0, items = 0;
        for (let id in cart) {
            let item = cart[id]; subtotal += item.price * item.qty; items += item.qty;
            html += `<div style="border-bottom:1px solid #003b46; padding:10px 0; color:white;">
                <div style="display:flex; justify-content:space-between;"><span>${item.name}</span><span>${formatPrice(item.price * item.qty)}</span></div>
                <button onclick="changeQty(${id},-1)">-</button><span style="margin:0 10px">${item.qty}</span><button onclick="changeQty(${id},1)">+</button>
            </div>`;
        }
        const desc = subtotal * 0.05;
        if (subtotal > 0) {
            html += `<div style="margin-top:15px; border-top:1px solid var(--kernel-cyan); padding-top:10px;">
                <div>Subtotal: ${formatPrice(subtotal)}</div>
                <div style="color:#00ff88;">Descuento (5%): - ${formatPrice(desc)}</div>
            </div>`;
        }
        list.innerHTML = html || '<p>Carrito vacío</p>';
        document.getElementById('count').innerText = items;
        document.getElementById('total').innerText = formatPrice(subtotal - desc);
    }

    function toggleCart() { document.getElementById('cart-panel').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
    function filterProducts() { const term = document.getElementById('product-search').value.toLowerCase(); renderCatalog(products.filter(p => p.name.toLowerCase().includes(term))); }
    
    function processPayment() {
        if (Object.keys(cart).length === 0) return alert("Carrito vacío");
        let msg = "Hola Kernel! Quiero comprar:%0A", sub = 0;
        for (let id in cart) { msg += `• ${cart[id].name} x${cart[id].qty}%0A`; sub += cart[id].price * cart[id].qty; }
        msg += `%0ATotal Final: ${formatPrice(sub * 0.95)}`;
        window.open(`https://wa.me/595984276867?text=${msg}`, '_blank');
        cart = {}; updateUI(); showCatalog();
    }

    renderCatalog();
    initCarousel();
</script>
</body>
</html>

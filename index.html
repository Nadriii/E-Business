<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel - Informática y Accesorios</title>
    <style>
        :root {
            --kernel-cyan: #00e5ff;
            --kernel-blue-dark: #003b46;
            --kernel-gradient: radial-gradient(circle, #005f6b 0%, #002b36 100%);
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background: var(--kernel-gradient) fixed;
            color: var(--white);
            background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png');
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER Y LOGO ANIMADO --- */
        header {
            background-color: rgba(0, 43, 54, 0.95);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--kernel-cyan);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        
        .key-logo {
            width: 45px; height: 45px; background: #1e293b; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem; color: var(--kernel-cyan);
            box-shadow: 0 4px 0 #008ba3, 0 6px 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 229, 255, 0.3);
            transition: all 0.1s active;
        }
        .key-logo:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #008ba3, 0 2px 5px rgba(0,0,0,0.5);
        }

        .brand-name {
            font-size: 1.8rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin: 0;
            background: linear-gradient(to bottom, #fff 50%, #bbb 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- BUSCADOR --- */
        .search-wrapper { position: relative; max-width: 500px; margin: 20px auto; }
        .search-wrapper::before { content: "🔍"; position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.7; }
        #product-search {
            width: 100%; padding: 12px 15px 12px 45px; border-radius: 25px; border: 1px solid var(--kernel-cyan);
            background: rgba(0,0,0,0.4); color: white; outline: none; box-sizing: border-box;
        }

        /* --- VISTAS --- */
        .view-section { padding: 20px 5%; display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- CATALOGO --- */
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .product-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 229, 255, 0.1); border-radius: 12px;
            padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .product-card:hover { border-color: var(--kernel-cyan); transform: scale(1.02); }
        .product-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }

        /* --- DETALLE PRODUCTO (ESTILO NISSEI) --- */
        .product-detail-container { display: flex; gap: 40px; background: rgba(0,0,0,0.2); padding: 30px; border-radius: 20px; }
        .detail-img { flex: 1; text-align: center; }
        .detail-img img { max-width: 100%; border-radius: 15px; border: 1px solid var(--kernel-cyan); }
        .detail-info { flex: 1; }
        .detail-info h2 { font-size: 2rem; margin-top: 0; color: var(--kernel-cyan); }
        .specs-list { list-style: none; padding: 0; margin: 20px 0; }
        .specs-list li { margin-bottom: 10px; padding-left: 20px; position: relative; }
        .specs-list li::before { content: "▹"; position: absolute; left: 0; color: var(--kernel-cyan); }
        .price-tag { font-size: 2.5rem; font-weight: bold; margin: 20px 0; display: block; }
        
        .action-bar { display: flex; gap: 15px; align-items: center; }
        .btn-main { background: var(--kernel-cyan); color: var(--kernel-blue-dark); padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; flex-grow: 1; }

        /* --- CARRUSEL ROTATIVO --- */
        .carousel-section { margin-top: 50px; border-top: 1px solid rgba(0, 229, 255, 0.2); padding-top: 30px; }
        .carousel-track { display: flex; gap: 15px; overflow: hidden; position: relative; height: 120px; }
        .carousel-item { 
            min-width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 10px; 
            padding: 5px; text-align: center; transition: 0.5s ease-in-out;
        }
        .carousel-item img { height: 70%; object-fit: contain; }
        .carousel-item span { display: block; font-size: 0.7rem; margin-top: 5px; }

        /* --- CARRITO (STAYS THE SAME) --- */
        .cart-panel { position: fixed; right: -400px; top: 0; width: 340px; height: 100%; background: #001f26; z-index: 2000; transition: 0.4s; padding: 25px; border-left: 2px solid var(--kernel-cyan); box-sizing: border-box; }
        .cart-panel.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleCart()"></div>

<header>
    <div class="logo-area" onclick="showCatalog()">
        <div class="key-logo">K</div>
        <h1 class="brand-name">Kernel</h1>
    </div>
    <div onclick="toggleCart()" style="cursor:pointer; background: var(--kernel-cyan); color: var(--kernel-blue-dark); padding: 10px 20px; border-radius: 5px; font-weight: bold;">
        🛒 MI CARRITO (<span id="count">0</span>)
    </div>
</header>

<main>
    <!-- VISTA CATALOGO -->
    <section id="catalog-view" class="view-section active">
        <div class="search-wrapper">
            <input type="text" id="product-search" placeholder="Buscar en Kernel..." onkeyup="filterProducts()">
        </div>
        <div class="catalog" id="catalog-grid"></div>
    </section>

    <!-- VISTA ESPECIFICACIONES -->
    <section id="detail-view" class="view-section">
        <button onclick="showCatalog()" style="background:none; border:none; color:var(--kernel-cyan); cursor:pointer; margin-bottom:20px;">← Volver al catálogo</button>
        <div id="product-detail-content"></div>
        
        <!-- CARRUSEL ROTATIVO ABAJO -->
        <div class="carousel-section">
            <h4 style="color: var(--kernel-cyan); margin-bottom: 15px;">PRODUCTOS DESTACADOS</h4>
            <div class="carousel-track" id="carousel-track"></div>
        </div>
    </section>
</main>

<!-- CARRITO LATERAL -->
<aside class="cart-panel" id="cart-panel">
    <h3 style="text-align: center; border-bottom: 1px solid var(--kernel-cyan); padding-bottom: 10px;">TU PEDIDO</h3>
    <div id="cart-list" style="margin: 20px 0; max-height: 70vh; overflow-y: auto;"></div>
    <div style="border-top: 1px solid var(--kernel-cyan); padding-top: 15px;">
        <div style="display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 15px;">
            <span>TOTAL:</span>
            <span id="total" style="color: var(--kernel-cyan); font-weight: bold;">$0</span>
        </div>
        <button onclick="processPayment()" style="background: #00ff88; color: #003b46; width: 100%; padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">COMPRAR AHORA</button>
    </div>
</aside>

<script>
    const products = [
        { id: 1, name: "Funda Notebook - Blue", price: 25.00, stock: 15, img: "https://via.placeholder.com/400/a0c4ff/003b46?text=Funda+Blue", specs: ["Material: Neopreno reforzado", "Cierre: Doble track", "Resistente al agua", "Para notebooks de 14-15.6 pulgadas"] },
        { id: 2, name: "Funda Notebook - Moss", price: 25.00, stock: 8, img: "https://via.placeholder.com/400/8d99ae/003b46?text=Funda+Moss", specs: ["Color: Verde Musgo Táctico", "Interior: Felpa anti-rayones", "Diseño Slim para mochilas", "Costuras de alta densidad"] },
        { id: 3, name: "Funda Notebook - Black", price: 28.00, stock: 25, img: "https://via.placeholder.com/400/2b2d42/ffffff?text=Funda+Black", specs: ["Acabado: Mate Profesional", "Bolsillo extra para cargador", "Protección contra caídas 360", "Garantía Kernel: 1 año"] },
        { id: 4, name: "Teclado Mecánico K1", price: 85.00, stock: 5, img: "https://via.placeholder.com/400/00e5ff/003b46?text=Teclado+K1", specs: ["Switch: Red (Silencioso)", "RGB: 16.8 millones de colores", "Conexión: USB-C Removible", "Cuerpo: Aluminio grado espacial"] },
        { id: 5, name: "Mouse Pro Wireless", price: 45.00, stock: 12, img: "https://via.placeholder.com/400/00e5ff/003b46?text=Mouse+Pro", specs: ["DPI: Hasta 16,000", "Batería: 80 horas de uso", "Peso: 63g Ultra ligero", "6 Botones programables"] }
    ];

    let cart = {};

    // --- NAVEGACIÓN ---
    function showCatalog() {
        document.getElementById('detail-view').classList.remove('active');
        document.getElementById('catalog-view').classList.add('active');
    }

    function showDetail(id) {
        const product = products.find(p => p.id == id);
        const detailView = document.getElementById('product-detail-content');
        
        detailView.innerHTML = `
            <div class="product-detail-container">
                <div class="detail-img"><img src="${product.img}" alt="${product.name}"></div>
                <div class="detail-info">
                    <h2>${product.name}</h2>
                    <span style="color:#aaa;">SKU: KR-${product.id}00${product.id} | Stock: ${product.stock}</span>
                    <ul class="specs-list">
                        ${product.specs.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                    <span class="price-tag">$${product.price.toFixed(2)}</span>
                    <div class="action-bar">
                        <button class="btn-main" onclick="addToCart(${product.id})">AGREGAR AL CARRITO</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('catalog-view').classList.remove('active');
        document.getElementById('detail-view').classList.add('active');
        window.scrollTo(0,0);
    }

    // --- RENDER ---
    function renderCatalog(items = products) {
        const grid = document.getElementById('catalog-grid');
        grid.innerHTML = items.map(p => `
            <div class="product-card" onclick="showDetail(${p.id})">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p style="color:var(--kernel-cyan); font-weight:bold;">$${p.price.toFixed(2)}</p>
                <small>Ver especificaciones →</small>
            </div>
        `).join('');
    }

    // --- CARRUSEL LÓGICA ---
    function initCarousel() {
        const track = document.getElementById('carousel-track');
        track.innerHTML = products.map(p => `
            <div class="carousel-item" onclick="showDetail(${p.id})">
                <img src="${p.img}">
                <span>$${p.price}</span>
            </div>
        `).join('');

        setInterval(() => {
            const first = track.firstElementChild;
            track.style.transition = '0.5s';
            track.style.transform = 'translateX(-115px)';
            setTimeout(() => {
                track.style.transition = 'none';
                track.style.transform = 'translateX(0)';
                track.appendChild(first);
            }, 500);
        }, 3000);
    }

    // --- CARRITO LÓGICA (MODIFICADA PARA STOCK) ---
    function addToCart(id) {
        const product = products.find(p => p.id === id);
        if (cart[id]) {
            if (cart[id].qty < product.stock) cart[id].qty++;
            else alert("Stock máximo alcanzado");
        } else {
            cart[id] = { ...product, qty: 1 };
        }
        updateUI();
    }

    function changeQty(id, delta) {
        if (cart[id]) {
            cart[id].qty += delta;
            if (cart[id].qty > cart[id].stock) { cart[id].qty = cart[id].stock; alert("Límite de stock"); }
            if (cart[id].qty <= 0) delete cart[id];
            updateUI();
        }
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        const count = document.getElementById('count');
        const total = document.getElementById('total');
        let html = '', sum = 0, items = 0;

        for (let id in cart) {
            let item = cart[id];
            sum += item.price * item.qty;
            items += item.qty;
            html += `
                <div style="border-bottom:1px solid #003b46; padding:10px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>${item.name}</span>
                        <span>$${(item.price * item.qty).toFixed(2)}</span>
                    </div>
                    <div style="margin-top:5px;">
                        <button onclick="changeQty(${id},-1)" style="cursor:pointer">-</button>
                        <span style="margin:0 10px">${item.qty}</span>
                        <button onclick="changeQty(${id},1)" style="cursor:pointer">+</button>
                    </div>
                </div>`;
        }
        list.innerHTML = html || '<p style="text-align:center;">Carrito vacío</p>';
        count.innerText = items;
        total.innerText = `$${sum.toFixed(2)}`;
    }

    function toggleCart() {
        document.getElementById('cart-panel').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function filterProducts() {
        const term = document.getElementById('product-search').value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(term));
        renderCatalog(filtered);
    }

    function processPayment() {
        if(Object.keys(cart).length === 0) return;
        alert("💻 Redirigiendo a Kernel Checkout...");
    }

    renderCatalog();
    initCarousel();
</script>

</body>
</html>
